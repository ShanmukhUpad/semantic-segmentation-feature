# Full config targeting LoveDA. Set dataset.root to your local LoveDA copy.
# See the README for the expected folder layout.
seed: 42
output_dir: results/loveda_deeplabv3
device: auto                # auto, cpu or cuda

dataset:
  name: loveda
  root: data/raw/LoveDA     # path to the LoveDA root holding Train, Val and Test
  num_classes: 7
  ignore_index: 255
  image_size: [512, 512]
  subset: null              # set to an integer to cap both splits for a fast dev loop

augmentation:
  enabled: true
  random_hflip: true
  random_vflip: true
  random_rot90: true
  color_jitter: true
  jitter: 0.2
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

dataloader:
  batch_size: 8
  num_workers: 4
  pin_memory: true

model:
  name: deeplabv3_resnet50
  pretrained: true

train:
  epochs: 50
  lr: 0.0005
  weight_decay: 0.0001
  optimizer: adam            # adam, adamw or sgd
  scheduler: cosine          # none, step or cosine
  loss: cross_entropy
  aux_loss_weight: 0.4       # weight on the DeepLabV3 auxiliary head
  grad_accum_steps: 1        # raise to simulate a larger batch on small memory
  amp: false                 # mixed precision, active only on a CUDA device
  save_every: 0              # also save a checkpoint every N epochs when greater than zero
  log_images: 6              # validation samples logged to the TensorBoard Images tab

analysis:
  boundary_width: 3          # pixels on each side of a class boundary counted as boundary
  num_error_images: 12       # worst scoring images rendered as error maps
  confidence_bins: 20        # bins in the confidence histogram
  size_bins: 3               # number of class frequency bins
